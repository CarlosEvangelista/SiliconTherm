name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  attestations: write
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME="silicontherm_rs"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="${BIN_NAME}-${VERSION}-${{ matrix.target }}.tar.gz"

          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${ARCHIVE}" "${BIN_NAME}"
          shasum -a 256 "dist/${ARCHIVE}" | awk '{print $1}' > "dist/${ARCHIVE}.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Build global checksums file
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          : > SHA256SUMS
          for archive in *.tar.gz; do
            checksum="$(cat "${archive}.sha256")"
            echo "${checksum}  ${archive}" >> SHA256SUMS
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tar.gz
